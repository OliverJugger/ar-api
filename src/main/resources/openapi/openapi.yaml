openapi: 3.0.3
info:
  title: AR-WC3 API
  description: >
    Contrat OpenAPI de l'application AR-WC3. Ce contrat est la source de
    vérité pour le client HTTP généré côté Angular (voir `ng-openapi-gen.json`)
    ainsi que pour le serveur mocké Mockoon (voir `mockoon/environment.json`).
  version: 1.0.0
servers:
  - url: http://localhost:3001
    description: Serveur mocké (Mockoon)
  - url: http://localhost:8080
    description: Backend Spring Boot (implémentation réelle)

tags:
  - name: auth
    description: Authentification
  - name: statistics
    description: Statistiques du tableau de bord
  - name: dossier-sinistre
    description : Gestion des dossiers sinistre

paths:
  /login:
    post:
      tags: [auth]
      summary: >
        Authentifie un utilisateur via HTTP Basic Auth (en-tête
        `Authorization: Basic base64(username:password)`) et retourne son profil
      operationId: login
      security:
        - basicAuth: []
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /prestations-prevoyance/dossier-sinistre/recherche:
    post:
      tags: [dossier-sinistre]
      summary: Recherche paginée des dossiers sinistre
      operationId: rechercherDossiersSinistre
      security:
        - basicAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Numéro de la page (commence à 0)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
          description: Nombre d'éléments par page
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DossierSinistreCriteria'
      responses:
        '200':
          description: Page de dossiers sinistre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDossierSinistre'

  /statistics:
    get:
      tags: [statistics]
      summary: Récupère les statistiques utilisées par les 4 graphiques du tableau de bord
      operationId: getStatistics
      security:
        - basicAuth: []
      responses:
        '200':
          description: Statistiques du tableau de bord
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsResponse'
        '401':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >
        HTTP Basic Auth : en-tête `Authorization: Basic base64(username:password)`
        envoyé sur chaque requête.

  schemas:
    PaginatedResponse:
      type: object
      required :
        - page
        - pageSize
        - count
        - totalCount
      properties:
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        count:
          type: integer
          format: int32
        totalCount:
          type: integer
          format: int64 

    DossierSinistreCriteria:
      type: object
      properties:
        anterieur:
          type: boolean
          description: Filtre sur le caractère antérieur du dossier
        finNull:
          type: boolean
          description: Filtre sur de période de fin absente (= dossier actif)
        prenomIndividuContains:
          type: string
          description: Recherche partielle (contains) sur le prénom de l'individu
        nomIndividuContains:
          type: string
          description: Recherche partielle (contains) sur le nom de l'individu
        debutFrom:
          type: string
          format: date
          description: Borne inférieure de la période de début
        debutTo:
          type: string
          format: date
          description: Borne supérieure de la période de début
        finFrom:
          type: string
          format: date
          description: Borne inférieure de la période de fin
        finTo:
          type: string
          format: date
          description: Borne supérieure de la période de fin

    LoginResponse:
      type: object
      required:
        - success
        - user
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: '#/components/schemas/CurrentUser'

    CurrentUser:
      type: object
      required:
        - username
        - displayName
      properties:
        username:
          type: string
          example: olivier.mignot83
        displayName:
          type: string
          example: Olivier Mignot
        avatarInitials:
          type: string
          example: OM

    PageDossierSinistre:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
        - properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DossierSinistre'

    ChartDatum:
      type: object
      description: Un point de données pour un graphique de type "pie"
      required:
        - name
        - value
      properties:
        name:
          type: string
          example: Catégorie A
        value:
          type: number
          format: double
          example: 42

    StatisticsResponse:
      type: object
      required:
        - stat1
        - stat2
        - stat3
        - stat4
      properties:
        stat1:
          type: array
          items:
            $ref: '#/components/schemas/ChartDatum'
        stat2:
          type: array
          items:
            $ref: '#/components/schemas/ChartDatum'
        stat3:
          type: array
          items:
            $ref: '#/components/schemas/ChartDatum'
        stat4:
          type: array
          items:
            $ref: '#/components/schemas/ChartDatum'

    DossierSinistre:
      type: object
      description: Représente un dossier sinistre (table ARTHUS.DOSSIER_SINISTRE)
      required:
        - idDossier
      properties:
        idDossier:
          type: string
          maxLength: 9
          description: Identifiant unique du dossier (clé primaire)
          example: '123456789'
        refExt:
          type: string
          maxLength: 30
          nullable: true
          default: 'N'
          description: Référence externe
        individu:
          $ref: '#/components/schemas/Individu'
        anterieur:
          type: string
          maxLength: 1
          nullable: true
          description: Indicateur antérieur (O/N)
          example: 'N'
        debut:
          type: string
          format: date-time
          nullable: true
          description: Date de début du dossier
        numUtil:
          type: integer
          nullable: true
          description: Numéro de l'utilisateur
        fin:
          type: string
          format: date-time
          nullable: true
          description: Date de fin du dossier
        cloture:
          type: string
          format: date-time
          nullable: true
          description: Date de clôture du dossier
        createur:
          type: integer
          nullable: true
          description: Identifiant du créateur
        creation:
          type: string
          format: date-time
          nullable: true
          description: Date de création de l'enregistrement
        modificateur:
          type: integer
          nullable: true
          description: Identifiant du dernier modificateur
        modification:
          type: string
          format: date-time
          nullable: true
          description: Date de dernière modification

    Individu:
      type: object
      description: Représente un individu (table ARTHUS.INDIVIDU)
      required:
        - numindiv
      properties:
        numindiv:
          type: integer
          format: int64
          description: Identifiant unique de l'individu
        type:
          type: integer
          format: int32
        nom:
          type: string
          maxLength: 30
        qualite:
          type: integer
          format: int32
        prenom:
          type: string
          maxLength: 30
        datnais:
          type: string
          format: date
        refcie:
          type: string
          maxLength: 30
        codcourrier1:
          type: integer
          format: int32
        codcourrier2:
          type: integer
          format: int32
        codtitre:
          type: integer
          format: int32
        sexe:
          type: integer
          format: int32
        potentiel:
          type: integer
          format: int32
        nomjf:
          type: string
          maxLength: 30
        creation:
          type: string
          format: date
        maj:
          type: string
          format: date
        numutil:
          type: integer
          format: int32
        numassu:
          type: integer
          format: int64
        typassu:
          type: integer
          format: int32
        typadr:
          type: integer
          format: int32
        regime:
          type: string
          maxLength: 2
        orgbase:
          type: integer
          format: int32
        matorg:
          type: string
          maxLength: 20
        cless:
          type: integer
          format: int32
        rang:
          type: integer
          format: int32
        natur:
          type: string
          maxLength: 2
        caisse:
          type: string
          maxLength: 3
        tel:
          type: string
          maxLength: 45
        fax:
          type: string
          maxLength: 15
        adr1:
          type: string
          maxLength: 30
        adr2:
          type: string
          maxLength: 30
        codpos:
          type: string
          maxLength: 5
        ville:
          type: string
          maxLength: 30
        codpays:
          type: integer
          format: int32
        guichetorg:
          type: string
          maxLength: 3
        cle:
          type: string
          maxLength: 1
        guichetpmt:
          type: string
          maxLength: 5
        email:
          type: string
          maxLength: 45
        datnaisRegime:
          type: string
          maxLength: 6
        modificateur:
          type: integer
          format: int32
        deces:
          type: string
          format: date
        nInsee:
          type: string
          maxLength: 20
        regime2:
          type: string
          maxLength: 2
        caisse2:
          type: string
          maxLength: 3
        guichetorg2:
          type: string
          maxLength: 3
        matorg2:
          type: string
          maxLength: 20
        cless2:
          type: integer
          format: int32
        lieunais:
          type: string
          maxLength: 30
        codpaysnais:
          type: integer
          format: int32
        coddepnais:
          type: string
          maxLength: 2
        codcomnais:
          type: string
          maxLength: 5

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Identifiants invalides
